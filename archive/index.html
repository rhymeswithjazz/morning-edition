<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 18px; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fafaf9;
    min-height: 100vh;
  }
  .header {
    padding: clamp(3rem, 10vw, 6rem) clamp(2rem, 6vw, 5rem);
    max-width: 52rem;
    margin: 0 auto;
  }
  .header .label {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #fb923c;
    margin-bottom: 1.5rem;
  }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 900;
    font-style: italic;
    line-height: 1;
    margin-bottom: 1rem;
  }
  .header p {
    font-size: 1.1rem;
    color: #a8a29e;
    line-height: 1.6;
    max-width: 36rem;
  }
  .header .nav-links {
    margin-top: 1.5rem;
    display: flex;
    gap: 1.5rem;
  }
  .header .nav-links a {
    font-size: 0.85rem;
    text-decoration: none;
    font-weight: 600;
  }
  .header .home-link { color: #a8a29e; }
  .header .home-link:hover { color: #fb923c; }
  .header .rss-link { color: #fb923c; }
  .header .rss-link:hover { text-decoration: underline; }
  .editions {
    max-width: 52rem;
    margin: 0 auto;
    padding: 0 clamp(2rem, 6vw, 5rem) 4rem;
  }
  .edition-row {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 1.5rem 0;
    border-top: 1px solid #292524;
    text-decoration: none;
    color: #fafaf9;
    transition: background 0.15s;
  }
  .edition-row:hover {
    background: rgba(251,146,60,0.04);
  }
  .edition-date {
    font-size: 0.85rem;
    color: #78716c;
    min-width: 10rem;
    line-height: 1.4;
  }
  .edition-date strong {
    color: #a8a29e;
    font-weight: 600;
  }
  .edition-title {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 600;
    display: flex;
    align-items: center;
  }
  .edition-arrow {
    font-size: 1.2rem;
    color: #57534e;
    transition: color 0.15s, transform 0.15s;
  }
  .edition-row:hover .edition-arrow {
    color: #fb923c;
    transform: translateX(4px);
  }
  .empty {
    padding: 4rem 0;
    text-align: center;
    color: #57534e;
    font-size: 1.1rem;
  }
  .footer {
    max-width: 52rem;
    margin: 0 auto;
    padding: 3rem clamp(2rem, 6vw, 5rem);
    border-top: 1px solid #1c1917;
    font-size: 0.8rem;
    color: #57534e;
  }
  @media (max-width: 640px) {
    .edition-row { flex-wrap: wrap; gap: 0.5rem; }
    .edition-date { min-width: 100%; }
  }

  <div class="header">
